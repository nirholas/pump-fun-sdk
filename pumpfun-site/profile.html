<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — launchpad</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟢</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="16" fill="url(#lg)" />
          <path d="M12 24 L18 8 L24 24 L18 19 Z" fill="#0e0e16" />
          <defs><linearGradient id="lg" x1="0" y1="0" x2="36" y2="36"><stop offset="0%" stop-color="#7bff69"/><stop offset="100%" stop-color="#00d4ff"/></linearGradient></defs>
        </svg>
        <span>launch<span class="logo-accent">pad</span></span>
        <span class="logo-crown">👑</span>
      </a>

      <nav class="nav">
        <a href="index.html" class="nav-link">Board</a>
        <a href="create.html" class="nav-link">Create</a>
        <a href="token.html" class="nav-link">Trade</a>
        <a href="profile.html" class="nav-link active">Profile</a>
      </nav>

      <div class="header-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search tokens...">
      </div>

      <button class="btn-wallet">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><circle cx="18" cy="16" r="1"/></svg>
        <span>Connect Wallet</span>
      </button>

      <button class="mobile-toggle" onclick="toggleMobileNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="mobile-nav" id="mobileNav">
    <a href="index.html">🏠 Board</a>
    <a href="create.html">🪙 Create Token</a>
    <a href="token.html">📈 Trade</a>
    <a href="profile.html" class="active">👤 Profile</a>
  </div>

  <!-- Main -->
  <main class="main">
    <div class="container">

      <!-- Profile header -->
      <div class="profile-header fade-in">
        <div class="profile-avatar">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#7bff69,#00d4ff);display:flex;align-items:center;justify-content:center;font-size:36px;">🦍</div>
        </div>
        <div>
          <div class="profile-name" id="profileName">Connect wallet to view profile</div>
          <div class="profile-addr" id="profileAddr">—</div>
          <div class="profile-stats-row" id="profileStats">
            <span class="profile-stat">Tokens created: <strong id="statCreated">—</strong></span>
          </div>
        </div>
      </div>

      <!-- Profile tabs -->
      <div class="tab-bar" style="margin-bottom:0;">
        <button class="tab active" onclick="switchProfileTab(this, 'created')"><span class="tab-emoji">🪙</span> Created</button>
        <button class="tab" onclick="switchProfileTab(this, 'activity')"><span class="tab-emoji">📋</span> Activity</button>
      </div>

      <!-- Created tokens -->
      <div id="profile-created">
        <div class="token-grid" id="createdTokenGrid">
          <div style="padding:40px;text-align:center;color:var(--text-muted);grid-column:1/-1;">Connect wallet to see created tokens</div>
        </div>
      </div>

      <!-- Activity (hidden) -->
      <div id="profile-activity" style="display:none;padding:20px 0;">
        <div class="chart-panel">
          <div style="padding:0;">
            <table class="tx-table">
              <thead>
                <tr>
                  <th>Action</th>
                  <th>Token</th>
                  <th>Amount</th>
                  <th>Time</th>
                </tr>
              </thead>
              <tbody id="activityBody">
                <tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:20px;">Connect wallet to see activity</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="#">Docs</a>
        <a href="#">GitHub</a>
        <a href="#">Twitter</a>
        <a href="#">Telegram</a>
      </div>
      <div class="footer-copy">© 2025 launchpad — built on Solana</div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    function switchProfileTab(btn, tab) {
      document.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      ['created','activity'].forEach(t => {
        const el = document.getElementById('profile-' + t);
        if (el) el.style.display = (t === tab) ? '' : 'none';
      });
    }

    // Load profile from connected wallet or URL param
    (async () => {
      await new Promise(r => setTimeout(r, 500)); // Wait for wallet auto-reconnect
      const params = new URLSearchParams(window.location.search);
      const addr = params.get('address') || connectedWallet;
      if (!addr) return;

      document.getElementById('profileName').textContent = shortAddr(addr);
      document.getElementById('profileAddr').textContent = addr;

      // Fetch coins created by this address
      try {
        const res = await fetch(`${PUMP_API}/coins/user-created-coins/${encodeURIComponent(addr)}?limit=20&offset=0&includeNsfw=false`);
        if (res.ok) {
          const coins = await res.json();
          if (Array.isArray(coins) && coins.length > 0) {
            document.getElementById('statCreated').textContent = coins.length;
            renderCoinCards(coins, 'createdTokenGrid');
          } else {
            document.getElementById('statCreated').textContent = '0';
            document.getElementById('createdTokenGrid').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);grid-column:1/-1;">No tokens created</div>';
          }
        }
      } catch (_) {}
    })();
  </script>
</body>
</html>
